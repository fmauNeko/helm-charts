apiVersion: v1
kind: Service
metadata:
  name: {{ include "netbird.relay.fullname" . }}
  labels:
    {{- include "netbird.labels" . | nindent 4 }}
    app.kubernetes.io/component: relay
spec:
  type: {{ .Values.relay.service.type }}
  selector:
    {{- include "netbird.relay.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.relay.service.port }}
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
