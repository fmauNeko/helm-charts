{{- if .Values.patSeed.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "netbird.fullname" . }}-pat-seed
  labels:
    {{- include "netbird.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "netbird.fullname" . }}-pat-seed
  labels:
    {{- include "netbird.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "netbird.fullname" . }}-pat-seed
  labels:
    {{- include "netbird.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "netbird.fullname" . }}-pat-seed
subjects:
  - kind: ServiceAccount
    name: {{ include "netbird.fullname" . }}-pat-seed
    namespace: {{ .Release.Namespace }}
{{- end }}
