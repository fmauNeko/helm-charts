{{- if .Values.patSeed.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "netbird.fullname" . }}-pat-seed
  labels:
    {{- include "netbird.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  activeDeadlineSeconds: {{ .Values.patSeed.activeDeadlineSeconds }}
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: {{ include "netbird.fullname" . }}-pat-seed
      restartPolicy: OnFailure
      initContainers:
        - name: wait-management
          image: {{ .Values.patSeed.image.repository }}:{{ .Values.patSeed.image.tag }}
          imagePullPolicy: {{ .Values.patSeed.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for management..."
              until curl -sf "http://{{ include "netbird.management.fullname" . }}:{{ .Values.management.service.httpPort }}/api/instance"; do
                sleep 5
              done
              echo "Management ready"
      containers:
        - name: pat-seed
          image: {{ .Values.patSeed.image.repository }}:{{ .Values.patSeed.image.tag }}
          imagePullPolicy: {{ .Values.patSeed.image.pullPolicy }}
          command: ["sh", "/scripts/setup.sh"]
          env:
            - name: ADMIN_EMAIL
              value: {{ .Values.patSeed.adminEmail | quote }}
            - name: ADMIN_PASSWORD
              value: {{ .Values.patSeed.adminPassword | quote }}
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: {{ include "netbird.fullname" . }}-pat-seed-script
            defaultMode: 0755
{{- end }}
