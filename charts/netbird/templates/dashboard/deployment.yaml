apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netbird.dashboard.fullname" . }}
  labels:
    {{- include "netbird.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      {{- include "netbird.dashboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.dashboard.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "netbird.dashboard.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "netbird.dashboard.serviceAccountName" . }}
      containers:
        - name: dashboard
          image: {{ include "netbird.dashboard.image" . }}
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: NETBIRD_MGMT_API_ENDPOINT
              value: {{ printf "https://%s" .Values.global.host | quote }}
            - name: NETBIRD_MGMT_GRPC_API_ENDPOINT
              value: {{ printf "https://%s" .Values.global.host | quote }}
            {{- if eq .Values.auth.mode "embedded" }}
            - name: AUTH_AUTHORITY
              value: {{ printf "https://%s/oauth2" .Values.global.host | quote }}
            - name: AUTH_CLIENT_ID
              value: 'netbird-dashboard'
            - name: AUTH_AUDIENCE
              value: 'netbird-dashboard'
            - name: AUTH_SUPPORTED_SCOPES
              value: 'openid profile email groups'
            - name: AUTH_REDIRECT_URI
              value: '/nb-auth'
            - name: AUTH_SILENT_REDIRECT_URI
              value: '/nb-silent-auth'
            - name: USE_AUTH0
              value: 'false'
            - name: NETBIRD_TOKEN_SOURCE
              value: 'accessToken'
            {{- else }}
            - name: AUTH_AUTHORITY
              value: {{ .Values.auth.external.authority | quote }}
            - name: AUTH_CLIENT_ID
              value: {{ .Values.auth.external.clientId | quote }}
            - name: AUTH_AUDIENCE
              value: {{ .Values.auth.external.audience | quote }}
            - name: AUTH_SUPPORTED_SCOPES
              value: {{ .Values.auth.external.supportedScopes | quote }}
            - name: AUTH_REDIRECT_URI
              value: {{ .Values.auth.external.redirectUri | quote }}
            - name: AUTH_SILENT_REDIRECT_URI
              value: {{ .Values.auth.external.silentRedirectUri | quote }}
            - name: USE_AUTH0
              value: {{ .Values.auth.external.useAuth0 | quote }}
            - name: NETBIRD_TOKEN_SOURCE
              value: {{ .Values.auth.external.tokenSource | quote }}
            {{- end }}
            {{- with .Values.dashboard.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
      {{- with .Values.dashboard.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
