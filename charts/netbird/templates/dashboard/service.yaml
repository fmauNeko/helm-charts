apiVersion: v1
kind: Service
metadata:
  name: {{ include "netbird.dashboard.fullname" . }}
  labels:
    {{- include "netbird.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.dashboard.service.type }}
  selector:
    {{- include "netbird.dashboard.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.dashboard.service.port }}
      targetPort: http
      protocol: TCP
