{{- if .Values.management.replicaCount }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netbird.management.fullname" . }}
  labels:
    {{- include "netbird.labels" . | nindent 4 }}
    app.kubernetes.io/component: management
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "netbird.management.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/management/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/management/secret.yaml") . | sha256sum }}
        {{- with .Values.management.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "netbird.management.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "netbird.management.serviceAccountName" . }}
      containers:
        - name: management
          image: {{ include "netbird.management.image" . }}
          imagePullPolicy: {{ .Values.management.image.pullPolicy }}
          args:
            - --config=/etc/netbird/management.json
            - --port=80
            - --log-level=info
            - --datadir=/var/lib/netbird
          envFrom:
            - secretRef:
                name: {{ include "netbird.management.secretName" . }}
          env:
            - name: NB_SETUP_PAT_ENABLED
              value: "true"
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: grpc
              containerPort: 33073
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/instance
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/instance
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/netbird
              readOnly: true
            - name: data
              mountPath: /var/lib/netbird
          resources:
            {{- toYaml .Values.management.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "netbird.management.fullname" . }}
        - name: data
          {{- if .Values.management.persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.management.persistence.existingClaim }}
          {{- else if .Values.management.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "netbird.management.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.management.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.management.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.management.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
