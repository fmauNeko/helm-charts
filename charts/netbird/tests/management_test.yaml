suite: management workload
templates:
  - templates/management/deployment.yaml
  - templates/management/service.yaml
  - templates/management/serviceaccount.yaml
  - templates/management/configmap.yaml
  - templates/management/secret.yaml
  - templates/management/pvc.yaml
tests:
  - it: has Recreate strategy
    set:
      auth.mode: external
    template: templates/management/deployment.yaml
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: logs to console by default so kubectl logs works
    set:
      auth.mode: external
    template: templates/management/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --log-file=console
      - contains:
          path: spec.template.spec.containers[0].args
          content: --log-level=info

  - it: honors logLevel and logFile overrides
    set:
      auth.mode: external
      management.logLevel: debug
      management.logFile: /var/log/netbird/management.log
    template: templates/management/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --log-level=debug
      - contains:
          path: spec.template.spec.containers[0].args
          content: --log-file=/var/log/netbird/management.log

  - it: has grpc port on service
    set:
      auth.mode: external
    template: templates/management/service.yaml
    asserts:
      - contains:
          path: spec.ports
          content:
            name: grpc
            port: 33073
            protocol: TCP
            targetPort: grpc

  - it: external mode has PKCEAuthorizationFlow not EmbeddedIdP
    set:
      auth.mode: external
    template: templates/management/configmap.yaml
    asserts:
      - matchRegex:
          path: data["management.json"]
          pattern: PKCEAuthorizationFlow
      - notMatchRegex:
          path: data["management.json"]
          pattern: EmbeddedIdP

  - it: external mode omits AuthKeysLocation by default and uses discovery endpoint
    set:
      auth.mode: external
      auth.external.authority: https://sso.example.com
    template: templates/management/configmap.yaml
    asserts:
      - notMatchRegex:
          path: data["management.json"]
          pattern: '"AuthKeysLocation"'
      - matchRegex:
          path: data["management.json"]
          pattern: '"OIDCConfigEndpoint": "https://sso.example.com/.well-known/openid-configuration"'

  - it: external mode supports explicit OIDC discovery and JWKS overrides
    set:
      auth.mode: external
      auth.external.authority: https://sso.example.com
      auth.external.oidcConfigEndpoint: https://issuer.example.net/.well-known/openid-configuration
      auth.external.authKeysLocation: https://issuer.example.net/oauth/v2/keys
    template: templates/management/configmap.yaml
    asserts:
      - matchRegex:
          path: data["management.json"]
          pattern: '"OIDCConfigEndpoint": "https://issuer.example.net/.well-known/openid-configuration"'
      - matchRegex:
          path: data["management.json"]
          pattern: '"AuthKeysLocation": "https://issuer.example.net/oauth/v2/keys"'

  - it: embedded mode has EmbeddedIdP not IdpManagerConfig
    set:
      auth.mode: embedded
      global.host: netbird.example.com
    template: templates/management/configmap.yaml
    asserts:
      - matchRegex:
          path: data["management.json"]
          pattern: EmbeddedIdP
      - notMatchRegex:
          path: data["management.json"]
          pattern: IdpManagerConfig

  - it: postgres store has Engine postgres in management.json
    set:
      auth.mode: external
      store.engine: postgres
    template: templates/management/configmap.yaml
    asserts:
      - matchRegex:
          path: data["management.json"]
          pattern: '"Engine": "postgres"'

  - it: renders string STUN values as NetBird Host objects
    set:
      auth.mode: external
      managementConfig.stuns:
        - stun:stun.example.com:3478
    template: templates/management/configmap.yaml
    asserts:
      - matchRegex:
          path: data["management.json"]
          pattern: '"Stuns": \[{"Proto":"udp","URI":"stun:stun.example.com:3478"}\]'

  - it: renders object TURN values as NetBird Host objects with credentials
    set:
      auth.mode: external
      managementConfig.turn.turns:
        - proto: tcp
          uri: turn:turn.example.com:5349
          username: user
          password: pass
    template: templates/management/configmap.yaml
    asserts:
      - matchRegex:
          path: data["management.json"]
          pattern: '"Turns": \[{"Password":"pass","Proto":"tcp","URI":"turn:turn.example.com:5349","Username":"user"}\]'

  - it: existingSecret suppresses Secret creation
    set:
      auth.mode: external
      secrets.existingSecret: my-existing-secret
    template: templates/management/secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: invalid auth.mode fails template
    set:
      auth.mode: invalid
    template: templates/management/deployment.yaml
    asserts:
      - failedTemplate:
          errorMessage: "auth.mode must be 'external' or 'embedded'"
