# Labels synced to GitHub via labels-sync.yaml workflow
# Edit this file to manage the label set (never edit labels directly in GitHub UI)

# --- Conventional Commit type labels ---
- name: 'enhancement'
  color: 'a2eeef'
  description: 'New feature or request (feat:)'

- name: 'bug'
  color: 'd73a4a'
  description: "Something isn't working (fix:)"

- name: 'chore'
  color: 'e4e669'
  description: 'Maintenance, build, or CI changes (chore:/build:/ci:)'

- name: 'documentation'
  color: '0075ca'
  description: 'Documentation changes (docs:)'

- name: 'dependencies'
  color: '0366d6'
  description: 'Dependency updates (Renovate PRs)'

- name: 'refactor'
  color: 'd4c5f9'
  description: 'Code refactoring (refactor:)'

- name: 'test'
  color: 'bfd4f2'
  description: 'Test additions or fixes (test:)'

# --- Integration testing gate ---
- name: 'run-integration'
  color: 'f9d0c4'
  description: 'Trigger full ct install integration tests in CI'

# --- Release Please automation labels ---
- name: 'autorelease: pending'
  color: 'ededed'
  description: 'Release Please: release PR is pending'

- name: 'autorelease: tagged'
  color: 'ededed'
  description: 'Release Please: release has been tagged'

# --- PR status labels ---
- name: 'do not merge'
  color: 'ee0701'
  description: 'This PR should not be merged'

- name: 'help wanted'
  color: '008672'
  description: 'Extra attention is needed'
