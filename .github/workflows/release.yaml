# Release workflow: Release Please manages versions/changelogs/tags,
# then the publish job packages and pushes released charts to GHCR as OCI artifacts.
#
# Release Please uses a GitHub App token so its PRs trigger CI workflows normally.
# Required repository configuration:
#   vars.RELEASE_APP_ID          — GitHub App ID
#   secrets.RELEASE_APP_PRIVATE_KEY — GitHub App private key (PEM)
name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}

  publish:
    name: Publish charts to GHCR
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart_path: ${{ fromJSON(needs.release-please.outputs.paths_released) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Build chart dependencies
        run: |
          helm dependency build "${{ matrix.chart_path }}" || true

      - name: Lint chart
        run: |
          helm lint --strict "${{ matrix.chart_path }}"

      - name: Package chart
        run: |
          mkdir -p dist
          helm package "${{ matrix.chart_path }}" --destination dist

      - name: Check version does not already exist in GHCR
        run: |
          set -euo pipefail
          PKG=$(find dist -maxdepth 1 -name '*.tgz' | head -1)
          if [ -z "$PKG" ]; then
            echo "No chart package found in dist/"; exit 1
          fi
          CHART_NAME=$(helm show chart "$PKG" | grep '^name:' | awk '{print $2}')
          CHART_VERSION=$(helm show chart "$PKG" | grep '^version:' | awk '{print $2}')
          REPO="oci://ghcr.io/${GITHUB_REPOSITORY,,}/charts"
          echo "Checking if ${REPO}/${CHART_NAME}:${CHART_VERSION} already exists..."
          if helm pull "${REPO}/${CHART_NAME}" --version "${CHART_VERSION}" --destination /tmp/check 2>/dev/null; then
            echo "ERROR: Version ${CHART_VERSION} already exists for ${CHART_NAME}. Refusing to overwrite."
            exit 1
          fi
          echo "Version does not exist. Proceeding with push."

      - name: Push chart to GHCR
        run: |
          set -euo pipefail
          REPO="oci://ghcr.io/${GITHUB_REPOSITORY,,}/charts"
          for pkg in dist/*.tgz; do
            echo "Pushing $pkg to $REPO"
            helm push "$pkg" "$REPO"
          done
